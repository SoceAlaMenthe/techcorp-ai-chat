# docker-compose.triton.yml — Bonus INFRA : déploiement Triton Inference Server.
#
# Depuis la racine du projet :
#   docker compose -f rendu/infra/docker-compose.triton.yml up --build
#
# Nécessite un GPU NVIDIA + nvidia-container-toolkit.
services:
  triton:
    build:
      context: ../../tritton_server
    image: techcorp-triton:latest
    command: >
      tritonserver
      --model-repository=/opt/tritonserver/model_repository
      --log-verbose=1
    ports:
      - "8000:8000"   # HTTP / REST
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics (Prometheus)
    volumes:
      - ../../model_repository:/opt/tritonserver/model_repository
    environment:
      # Token optionnel pour repos HuggingFace privés (ne jamais committer).
      - PRIVATE_REPO_TOKEN=${PRIVATE_REPO_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
